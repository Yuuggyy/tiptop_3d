<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tip Top — Menu</title>
    <meta name="theme-color" content="#FBF3E7" />

    <!-- Favicon (mis à jour automatiquement à chaque build depuis le logo du restaurant) -->
    <link rel="icon" type="image/png" href="__FAVICON_URL__" />
    <link rel="apple-touch-icon" href="__FAVICON_URL__" />

    <!-- Open Graph / aperçu de lien (WhatsApp, Facebook, etc.) -->
    <meta property="og:title" content="__OG_TITLE__" />
    <meta property="og:description" content="__OG_DESC__" />
    <meta property="og:image" content="__OG_IMAGE__" />
    <meta property="og:type" content="website" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="__OG_TITLE__" />
    <meta name="twitter:description" content="__OG_DESC__" />
    <meta name="twitter:image" content="__OG_IMAGE__" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
